<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忠生中バスケ部</title>
<style>
:root{
  --court:#c8965a;--bg:#1c2127;--panel:#262c34;--card:#1f242b;
  --text:#e8eaed;--muted:#9aa0a6;--accent:#3aa6b9;
  --blue:#1976d2;--red:#d32f2f;--ball:#ef6c00;--ok:#2e7d32;--line:#2a313a;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;
  display:flex;flex-direction:column;align-items:center;padding:0;min-height:100vh}
.main-tabs{display:flex;width:100%;max-width:760px;border-bottom:2px solid var(--line);
  position:sticky;top:0;z-index:20;background:var(--bg)}
.main-tabs button{flex:1;padding:14px 0;font-size:14px;font-weight:700;background:transparent;
  border:none;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}
.main-tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
.main-tabs button:hover{color:var(--text)}
.main-pane{display:none;width:100%;max-width:760px;padding:14px 14px 40px;flex-direction:column;align-items:center;gap:0}
.main-pane.active{display:flex}

button,select{font-size:13px;padding:8px 14px;border-radius:8px;border:1px solid #3a414b;
  background:var(--panel);color:var(--text);cursor:pointer;font-family:inherit}
input[type=text],textarea{font-size:13px;padding:8px 12px;border-radius:8px;
  border:1px solid #3a414b;background:#1f242b;color:var(--text);font-family:inherit}
button:hover{background:#30373f}
button.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
button.rec{background:var(--red);border-color:var(--red);color:#fff}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}
.seg{display:flex;border:1px solid #3a414b;border-radius:8px;overflow:hidden}
.seg button{border:none;border-radius:0}
.label{font-size:12px;color:var(--muted)}
fieldset{border:1px solid #333b44;border-radius:10px;padding:10px 14px;margin:0;width:100%}
legend{font-size:12px;color:var(--muted);padding:0 6px}
.plays{display:flex;gap:8px;flex-wrap:wrap}
.plays button{background:#2d343d}
.plays button.active{background:var(--accent);color:#fff}
#playButtons{display:flex;flex-direction:column;gap:10px;width:100%}
.play-group{display:flex;flex-direction:column;gap:6px}
.cat-label{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:.04em}
.myplay{display:inline-flex;align-items:center;gap:0;margin:4px 6px 4px 0}
.myplay button{background:#2d343d;border-radius:8px 0 0 8px}
.myplay button.active{background:var(--accent);color:#fff}
.myplay .del{padding:8px 10px;border-radius:0 8px 8px 0;border-left:none;background:#3a2326;color:#ff9a9a}
.myplay .del:hover{background:var(--red);color:#fff}
.legend{display:flex;gap:14px;font-size:12px;color:var(--muted);flex-wrap:wrap;justify-content:center;padding:6px 0}
.legend span{display:flex;align-items:center;gap:5px}
.dot{width:11px;height:11px;border-radius:50%;display:inline-block}
canvas{display:block;border-radius:10px;touch-action:none;box-shadow:0 4px 16px rgba(0,0,0,.4);max-width:100%}

.full-w{width:100%}
.sub-seg{display:flex;border:1px solid #3a414b;border-radius:8px;overflow:hidden;margin:14px 0 12px;width:100%}
.sub-seg button{flex:1;border:none;border-radius:0;padding:10px 0;font-size:14px;font-weight:700;background:#2d343d;color:var(--muted)}
.sub-seg button.active{background:var(--accent);color:#fff}

#rtPanel,#rtPanelP{width:100%;background:#222831;border:1px solid #3a414b;border-radius:10px;padding:11px 13px;margin-top:6px}
.kf-count{font-size:14px;font-weight:700;color:var(--accent);padding:0 8px 0 2px}
.kf-done{background:#2e7d32!important;border-color:#2e7d32!important;color:#fff!important;font-weight:600}
.kf-hint{font-size:11.5px;color:var(--muted);line-height:1.6;margin-top:9px}

/* 動画ライブラリ */
.vid-tabs{display:flex;gap:6px;margin-bottom:14px;width:100%}
.vid-tabs button{flex:1;background:#2d343d;border:1px solid #333b44;padding:10px 0;font-weight:600}
.vid-tabs button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.vid-help{font-size:11.5px;color:var(--muted);line-height:1.6;margin-bottom:12px;width:100%}
.vl-ptabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;width:100%}
.vl-ptabs button{font-size:12px;padding:7px 14px;border-radius:20px;border:1px solid #3a414b;background:#262c34;color:var(--muted);cursor:pointer}
.vl-ptabs button.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.vl-ptabs button.addp{border-style:dashed}
.vl-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.vl-name{font-size:16px;color:#fff;font-weight:700}
.vl-style{font-size:11.5px;color:var(--accent);background:rgba(58,166,185,.14);padding:3px 10px;border-radius:20px}
.vl-note{font-size:12.5px;color:#aab1b8;line-height:1.65;margin:7px 0 13px;white-space:pre-wrap}
.vl-row{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:10px;background:#1f242b;margin-bottom:7px;border:1px solid #2a313a}
.vl-row.has:hover{border-color:var(--accent);background:#232a33}
.vl-main{flex:1;display:flex;align-items:center;gap:11px;min-width:0;text-decoration:none;color:inherit}
.vl-row .ic{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;background:var(--accent);color:#fff}
.vl-row.empty .ic{background:#39414b;color:#7d858e}
.vl-row .lab{font-size:13.5px;line-height:1.35;overflow-wrap:anywhere}
.vl-row.empty .lab{color:var(--muted)}
.vl-row .tag{font-size:10.5px;color:#7d858e;margin-left:6px;white-space:nowrap}
.vl-act{display:flex;gap:5px;flex-shrink:0}
.vl-act button{width:31px;height:31px;border-radius:8px;border:1px solid #333b44;background:#2a313a;color:var(--muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;padding:0}
.vl-act button:hover{color:#fff;border-color:var(--accent)}
.vl-act button.del:hover{color:#ff9a9a;border-color:#a44}
.vl-addrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;width:100%}
.vl-addbtn{font-size:12px;padding:8px 14px;border-radius:9px;border:1px dashed #4a525c;background:transparent;color:var(--muted);cursor:pointer}
.vl-addbtn:hover{color:#fff;border-color:var(--accent)}
.vid-toolrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px;padding-top:13px;border-top:1px solid #2a313a;width:100%}
.vid-toolrow button{font-size:11.5px;padding:7px 12px;color:var(--muted)}
#vidArea{width:100%}

/* 掲示板・スケジュール */
.board-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;width:100%}
.board-topbar h2{font-size:16px;font-weight:700;margin:0}
.coachbadge{font-size:11px;color:#7fd18a;border:1px solid #2e7d32;background:#1a2a1e;padding:3px 10px;border-radius:20px}
.b-tabs{display:flex;gap:6px;margin-bottom:14px;width:100%}
.b-tabs button{flex:1;background:#2d343d;border:1px solid #333b44;padding:10px 0;font-weight:600;font-size:13px}
.b-tabs button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.b-field{margin-bottom:12px;width:100%}
.b-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.b-field input,.b-field textarea{width:100%}
.b-field textarea{min-height:90px;resize:vertical;line-height:1.55}
.b-opts{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:12px;width:100%}
.b-opt{display:flex;align-items:center;gap:7px;font-size:13px}
.b-opt input{width:18px;height:18px;accent-color:var(--accent)}
.b-primary{background:var(--accent);border:1px solid var(--accent);color:#fff;font-weight:700;padding:12px 20px;border-radius:10px;font-size:14px;cursor:pointer;width:100%}
.b-primary:hover{filter:brightness(1.07)}
.b-ghost{background:transparent;border:1px solid #3a414b;color:var(--muted);padding:7px 13px;border-radius:8px;font-size:12px;cursor:pointer}
.b-ghost:hover{color:var(--text);border-color:var(--accent)}
.b-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:11px}
.b-card .who{font-size:12px;color:var(--accent);font-weight:700}
.b-card .who.anon{color:var(--muted)}
.b-card .btime{font-size:11px;color:var(--muted);float:right}
.b-card .qt{font-size:14px;line-height:1.6;margin:7px 0;white-space:pre-wrap;overflow-wrap:anywhere}
.b-pvt{font-size:10.5px;color:#ffcf8f;background:#3a2f1f;border:1px solid #6b4f25;padding:1px 7px;border-radius:20px;margin-left:6px}
.b-ans{background:#1a2a1e;border:1px solid #2e7d32;border-radius:9px;padding:10px 12px;margin-top:9px}
.b-ans .lab{font-size:11px;color:#7fd18a;font-weight:700;margin-bottom:4px}
.b-ans .body{font-size:13.5px;line-height:1.6;white-space:pre-wrap;overflow-wrap:anywhere}
.b-waiting{font-size:12px;color:var(--muted);margin-top:8px}
.b-cact{display:flex;gap:7px;margin-top:10px}
.b-cact button{font-size:12px;padding:7px 13px;border-radius:8px;border:1px solid #3a414b;background:#2d343d;color:var(--text);cursor:pointer}
.b-cact button.del{color:#ff9a9a}
.b-hint{font-size:11.5px;color:var(--muted);line-height:1.6;margin:6px 0 10px}
.b-notice{background:#3a2326;border:1px solid #6b3a3f;color:#ffc9cd;border-radius:10px;padding:12px 14px;font-size:12.5px;line-height:1.6;margin-bottom:12px;width:100%}
.b-empty{font-size:13px;color:var(--muted);text-align:center;padding:24px 0}
.b-vseg{display:inline-flex;border:1px solid #3a414b;border-radius:9px;overflow:hidden}
.b-vseg button{background:#2d343d;border:none;color:var(--text);padding:9px 14px;font-size:13px;cursor:pointer}
.b-vseg button.active{background:var(--accent);color:#fff;font-weight:600}

/* 追加分：スケジュールカード用 */
.s-tag{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;margin-bottom:10px}
.s-tag.match{background:#3a2f1f;color:#ffcf8f;border:1px solid #6b4f25}
.s-tag.tourney{background:#3a2326;color:#ffc9cd;border:1px solid #6b3a3f}
.s-date{font-size:16px;font-weight:700;color:#fff;margin-bottom:10px}
.s-detail{font-size:13px;line-height:1.6;color:var(--muted);margin-bottom:4px;display:flex;gap:10px}
.s-detail .sl{min-width:60px;flex-shrink:0}
.s-detail .sv{color:var(--text);font-weight:500;overflow-wrap:anywhere}
.s-route{background:#161a1f;padding:10px 13px;border-radius:8px;font-size:12.5px;line-height:1.6;white-space:pre-wrap;margin-top:12px;border:1px solid #2a313a}
.s-route-title{font-size:11.5px;color:var(--accent);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:5px}

#bPaneList,#bPanePost,#bPaneTicket{width:100%}

/* モーダル */
.vl-overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;z-index:1000;padding:18px}
.vl-overlay.show{display:flex}
.vl-modal{background:var(--panel);border:1px solid #3a414b;border-radius:14px;padding:22px;width:100%;max-width:420px;box-shadow:0 14px 44px rgba(0,0,0,.55);max-height:90vh;overflow-y:auto}
.vl-modal h3{margin:0 0 16px;font-size:15px;font-weight:600}
.vl-field
